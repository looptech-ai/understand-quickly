name: publish-cli

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      # pin: v6.0.0 -- actions/checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pin: v6.0.0 -- actions/setup-node
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install
        run: npm ci --no-audit --ignore-scripts

      - name: Verify version matches tag
        working-directory: '.'
        env:
          GH_REF: ${{ github.ref }}
        run: node scripts/check-versions.mjs --tag "$GH_REF"

      - name: Pack (sanity check)
        run: npm pack --dry-run

      - name: Pack artifact
        run: npm pack

      # pin: v3.2.0 -- actions/attest-build-provenance
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: 'cli/*.tgz'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::warning::NPM_TOKEN secret is not set; skipping npm publish. Set NPM_TOKEN (Automation token) on the repo to enable publishing."
            exit 0
          fi
          npm publish --access public --provenance
