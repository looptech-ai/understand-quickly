name: publish-cli

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      # pin: v6.0.0 -- actions/checkout
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      # pin: v6.0.0 -- actions/setup-node
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install
        run: npm install --no-audit

      - name: Verify version matches tag
        working-directory: '.'
        env:
          GH_REF: ${{ github.ref }}
        run: node scripts/check-versions.mjs --tag "$GH_REF"

      - name: Pack (sanity check)
        run: npm pack --dry-run

      - name: Pack artifact
        run: npm pack

      # pin: v3.2.0 -- actions/attest-build-provenance
      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f
        with:
          subject-path: 'cli/*.tgz'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::warning::NPM_TOKEN secret is not set; skipping npm publish. Set NPM_TOKEN (Automation token) on the repo to enable publishing."
            exit 0
          fi
          npm publish --access public --provenance
