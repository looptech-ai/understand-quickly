name: release-please

# Automated release PR generator. Watches main for Conventional Commits and
# opens / updates per-component Release PRs. Merging a Release PR creates the
# component tag (e.g. cli-vX.Y.Z) which fires the existing publish-*.yml
# workflows. No untrusted user input is interpolated into run: steps.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # pin: v4.1.5 -- googleapis/release-please-action
      - uses: googleapis/release-please-action@5792afc6b46e9bb55deda9eda973a18c226bc3fc
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
