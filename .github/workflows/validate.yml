name: validate

on:
  pull_request:
    paths:
      - 'registry.json'
      - 'schemas/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci

      - name: Compute changed entry ids
        id: changed
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          CHANGED=$(git diff --unified=0 "origin/${BASE_REF}..HEAD" -- registry.json \
            | grep -E '^\+' | grep -Eo '"id": *"[^"]+"' | sed -E 's/.*"id": *"([^"]+)".*/\1/' | sort -u | paste -sd, -)
          echo "ids=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Validate
        env:
          CHANGED_IDS: ${{ steps.changed.outputs.ids }}
        run: npm run validate

      - name: Run unit + integration tests
        run: npm test
