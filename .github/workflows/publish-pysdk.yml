name: publish-pysdk

# Triggered when a GitHub Release is published with a tag like
# `pysdk-vX.Y.Z`. Using a published-release trigger so the release
# notes are already in place when artifacts upload, and so the
# sdist/wheel attach to the release page itself.
#
# Publishing path:
#   1. Preferred: PyPI Trusted Publishing via OIDC. No token; the
#      `pypa/gh-action-pypi-publish` step exchanges the workflow's OIDC
#      ID-token for a short-lived PyPI upload token. Requires a Trusted
#      Publisher entry on PyPI ("understand-quickly" project) bound to
#      this exact workflow file. See docs/ops/pypi-trusted-publishing.md.
#   2. Fallback: legacy PYPI_API_TOKEN secret. Engaged only if Trusted
#      Publishing is not yet configured (the OIDC step will fail with
#      "Trusted publisher not configured" which we tolerate via
#      continue-on-error). Once the user has provisioned Trusted
#      Publishing, the fallback step can be deleted along with the secret.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to build (must match pysdk-v*)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build + publish python-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload assets onto the GitHub release
      id-token: write       # required for PyPI Trusted Publishing (OIDC) + Sigstore attestations
      attestations: write   # required for actions/attest-build-provenance
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'pysdk-v') }}

    defaults:
      run:
        working-directory: python-sdk

    steps:
      # pin: v6.0.0 -- actions/checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # pin: v6.0.0 -- actions/setup-python
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      # pin: v6.0.0 -- actions/setup-node
      - name: Set up Node (for version check)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'

      - name: Verify version matches tag
        working-directory: ${{ github.workspace }}
        env:
          GH_REF: ${{ github.ref }}
        run: node scripts/check-versions.mjs --tag "$GH_REF"

      - name: Install build tooling (hash-pinned)
        run: python -m pip install --require-hashes -r requirements/build.lock

      - name: Build sdist + wheel
        run: python -m build .

      - name: Twine check
        run: python -m twine check dist/*

      # pin: v3.2.0 -- actions/attest-build-provenance
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: 'python-sdk/dist/*'

      # pin: v4.6.2 -- actions/upload-artifact
      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-sdk-dist
          path: python-sdk/dist/*
          if-no-files-found: error

      # pin: v2.2.1 -- softprops/action-gh-release
      - name: Attach wheel + sdist to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: python-sdk/dist/*

      # Preferred path: PyPI Trusted Publishing (OIDC). The action will
      # short-circuit if the project isn't configured for trusted publishing
      # on PyPI's side, in which case we drop through to the token fallback.
      # pin: v1.12.4 -- pypa/gh-action-pypi-publish
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        id: pypi_oidc
        if: github.event_name == 'release'
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: python-sdk/dist
          skip-existing: true

      # Fallback path: legacy API token. Only runs if OIDC step failed.
      # Once Trusted Publishing is provisioned on PyPI, delete this step
      # and the PYPI_API_TOKEN secret.
      - name: Publish to PyPI (API token fallback)
        if: github.event_name == 'release' && steps.pypi_oidc.outcome != 'success'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "::warning::OIDC trusted publishing not configured and PYPI_API_TOKEN is unset; nothing published. See docs/ops/pypi-trusted-publishing.md to enable OIDC."
            exit 0
          fi
          python -m twine upload --skip-existing dist/*
