name: docs-on-release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-on-release
  cancel-in-progress: false

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      # pin: v6.0.0 -- actions/checkout
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      # pin: v6.0.0 -- actions/setup-node
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version-file: '.nvmrc'

      # Refresh the "Latest" callout. Script is intentionally fail-soft (any
      # registry timeout falls back to the previous values already in README).
      - name: Render latest callout
        run: node scripts/render-latest.mjs

      # Re-render the entries table — no-op unless registry.json changed
      # since the last render, but cheap enough to run every release.
      - name: Render README entry table (idempotent)
        run: node scripts/render-readme.mjs

      - name: Check for diff
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no doc changes"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Branch protection requires PRs into main; the bot cannot direct-push.
      # Open or update the bot/docs-on-release branch with the README diff.
      # Codeowner reviews + merges manually until a GitHub App token lets
      # the bot satisfy the codeowner-review rule via bypass.
      # pin: v8.1.1 -- peter-evans/create-pull-request
      - name: Open or update docs PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/docs-on-release
          delete-branch: true
          commit-message: 'docs: refresh latest versions in README (auto)'
          title: 'docs: refresh latest versions in README (auto)'
          body: |
            Automated README refresh triggered by a release publish.

            Touches `README.md` only:
              - "Latest" callout (`scripts/render-latest.mjs`)
              - Entries table (`scripts/render-readme.mjs`, idempotent)

            Mechanical — no human intent encoded. Merge once CI is green.
          labels: |
            bot-docs
            chore
          add-paths: |
            README.md

      - name: Trigger pages redeploy (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: gh workflow run pages.yml --repo "$REPO" --ref main || true
