name: Labeler

# Auto-apply `area:*` labels based on which files a PR touches. Keeps the PR
# list grep-able and lets release-drafter sort changes into categories.
#
# Config: .github/labeler.yml - path globs map to label names.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # pin: v6.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
