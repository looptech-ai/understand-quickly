name: audit

# Weekly post-merge npm audit so a CVE published against an existing
# dependency after the validate.yml PR-gate ran still surfaces. Mirrors
# the audit step on validate.yml; failure opens an issue via the standard
# Actions failure notification path.

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        path: ['.', 'mcp', 'cli']
    steps:
      # pin: v4.2.2 -- actions/checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # pin: v4.4.0 -- actions/setup-node
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json
      - name: npm audit ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        run: |
          npm ci
          npm audit --audit-level=high
