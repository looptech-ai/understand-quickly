name: gitleaks

# Diff-focused secret scan. Complements Socket Security (which is supply-
# chain focused, not secret-in-diff focused). Runs on PRs (scans the diff
# between base + head only — fast) and on push to main (scans full history
# of the new commits since the last successful run).
#
# We use the open-source gitleaks action, no license key required for
# personal / public repos. If the org later adopts gitleaks.io, drop the
# license here.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan diff for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # pin: v6.0.0 -- actions/checkout
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          # fetch full history for accurate diff scanning on push events
          fetch-depth: 0

      # pin: v2.3.7 -- gitleaks/gitleaks-action
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE intentionally: the OSS action is free for
          # public repos and personal accounts. Enterprise users would
          # need to set GITLEAKS_LICENSE in secrets.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'
          GITLEAKS_ENABLE_SUMMARY: 'true'
